<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GymPilot Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--primary:#38ef7d;
--dark:#0b0b0b;
--card:#111;
--text:#ffffff;
--muted:#9ca3af;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

/* LOGIN CARD */

.login-card{
width:420px;
max-width:100%;
background:var(--card);
padding:40px;
border-radius:18px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

/* TITLE */

.login-title{
text-align:center;
font-weight:600;
margin-bottom:30px;
}

/* INPUT */

.form-control{
background:#1b1b1b !important;
border:1px solid #333 !important;
color:#ffffff !important;
caret-color:#38ef7d;
border-radius:12px;
padding:12px;
font-weight:500;
}
/* placeholder fix */

input::placeholder{
color:#d1d5db !important;
opacity:1 !important;
}

input::-webkit-input-placeholder{
color:#d1d5db !important;
}

input:-ms-input-placeholder{
color:#d1d5db !important;
}

/* Placeholder text fix */

.form-control::placeholder{
color:#cbd5e1 !important;
opacity:1;
}

.form-control::-webkit-input-placeholder{
color:#cbd5e1 !important;
}

.form-control:-ms-input-placeholder{
color:#cbd5e1 !important;
}

/* Focus effect */

.form-control:focus{
background:#1b1b1b !important;
border-color:#38ef7d !important;
color:#ffffff !important;

box-shadow:
0 0 0 1px #38ef7d,
0 0 10px rgba(56,239,125,0.5),
0 0 20px rgba(56,239,125,0.25);

outline:none;
}
.form-control:hover{
border-color:#38ef7d;
box-shadow:0 0 6px rgba(56,239,125,0.25);
}

.login-card:hover{
box-shadow:
0 30px 70px rgba(0,0,0,0.8),
0 0 25px rgba(56,239,125,0.15);
}
/* LOGIN BUTTON */

.btn-login{
background:var(--primary);
border:none;
padding:12px;
border-radius:12px;
font-weight:600;
color:black;
}

.btn-login:hover{
opacity:0.9;
transform:translateY(-1px);
box-shadow:0 0 12px rgba(56,239,125,0.4);
}

/* LINK */

.forgot-link{
text-align:center;
margin-top:15px;
}

.forgot-link a{
color:#9ca3af;
text-decoration:none;
font-size:14px;
}

.forgot-link a:hover{
color:#38ef7d;
}

</style>

</head>

<body>

<div class="login-card">

<h3 class="login-title">GymPilot Login</h3>

<form method="POST" autocomplete="off">

{% csrf_token %}

<div class="mb-3">
<input
type="text"
name="username"
class="form-control"
placeholder="Username"
autocomplete="off"
required>
</div>

<div class="mb-3">
<input
type="password"
name="password"
class="form-control"
placeholder="Password"
autocomplete="off"
required>
</div>

<button type="submit" class="btn btn-login w-100">
Login
</button>

</form>

<div class="forgot-link">
<a href="{% url 'gym:password_reset' %}">Forgot Password?</a>
</div>

</div>

</body>
</html>
