<!DOCTYPE html>
<html>
<head>

<title>GymPilot Signin</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
--primary:#38ef7d;
--dark:#0b0b0b;
--card:#111;
--text:#ffffff;
--muted:#9ca3af;
}

body{
background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:var(--text);
padding:20px;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
position:relative;
}

/* LOGIN CARD */

.login-card{
background:var(--card);
padding:45px;
border-radius:18px;
width:420px;
max-width:100%;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
transition:0.3s;
}

.login-card:hover{
box-shadow:
0 25px 60px rgba(0,0,0,0.8),
0 0 20px rgba(56,239,125,0.15);
}

/* TITLE */

.login-title{
font-weight:700;
text-align:center;
margin-bottom:25px;
}

/* INPUT */

.form-control{
background:#1b1b1b !important;
border:1px solid #333 !important;
color:#ffffff !important;
padding:12px;
border-radius:12px;
caret-color:#38ef7d;
}

/* placeholder */

.form-control::placeholder{
color:#9ca3af !important;
}

/* focus glow */

.form-control:focus{
background:#1b1b1b !important;
border-color:#38ef7d !important;

box-shadow:
0 0 0 1px #38ef7d,
0 0 10px rgba(56,239,125,0.5),
0 0 20px rgba(56,239,125,0.25);

outline:none;
}


.back-btn{
position:absolute;
top:20px;
left:20px;
color:#9ca3af;
text-decoration:none;
font-size:14px;
display:flex;
align-items:center;
gap:6px;
}

.back-btn:hover{
color:#38ef7d;
}

/* BUTTON */

.btn-modern{
background:#38ef7d;
border:none;
width:100%;
color:black;
font-weight:600;
padding:12px;
border-radius:12px;
transition:0.2s;
}

.btn-modern:hover{
transform:translateY(-1px);
box-shadow:0 0 12px rgba(56,239,125,0.6);
}

/* MOBILE */

@media (max-width:768px){

.login-card{
padding:30px 25px;
border-radius:14px;
}

.login-title{
font-size:22px;
}

.form-control{
height:45px;
font-size:15px;
}

button{
height:45px;
font-size:16px;
}

}

</style>
</head>

<body>

<div class="login-card">

<h4 class="login-title">Sign in</h4>

<form method="POST">

{% csrf_token %}

<input type="text"
name="username"
class="form-control mb-3"
placeholder="Username"
required>

<input type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button type="submit" class="btn btn-modern mb-3">
Login
</button>


<a href="/" class="btn btn-modern btn-back">
Back
</a>
</form>


{% for message in messages %}

<div class="text-danger mt-3 text-center">
{{ message }}
</div>

{% endfor %}

</div>

</body>
</html>
