<!DOCTYPE html>
<html>
<head>

<title>GymPilot Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
--primary:#38ef7d;
--dark:#0b0b0b;
--card:#111;
--text:#ffffff;
--muted:#9ca3af;
}

body{
background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:var(--text);
padding:20px;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
}

.login-card{
background:var(--card);
padding:45px;
border-radius:18px;
width:420px;
max-width:100%;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.login-title{
font-weight:700;
text-align:center;
margin-bottom:25px;
}

input{
background:#1b1b1b !important;
border:1px solid #333 !important;
color:white !important;
}

input::placeholder{
color:#888;
}

.btn-modern{
background:var(--primary);
border:none;
width:100%;
color:black;
font-weight:600;
padding:10px;
}

.btn-modern:hover{
opacity:0.9;
}

/* MOBILE */

@media (max-width:768px){

.login-card{
padding:30px 25px;
border-radius:14px;
}

.login-title{
font-size:22px;
}

input{
height:45px;
font-size:15px;
}

button{
height:45px;
font-size:16px;
}

}

</style>

</head>

<body>

<div class="login-card">

<h4 class="login-title">GymPilot Owner Login</h4>

<form method="POST">

{% csrf_token %}

<input type="text"
name="username"
class="form-control mb-3"
placeholder="Username"
required>

<input type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button type="submit" class="btn btn-modern">
Login
</button>

</form>


{% for message in messages %}

<div class="text-danger mt-3 text-center">
{{ message }}
</div>

{% endfor %}

</div>

</body>
</html>
