{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <!-- PWA manifest removed to make this a regular website -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">

    <title>GYM PILOT</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Inter', sans-serif;
    /*background: black;*/
    overflow-x: hidden;
}

/* ===== Header ===== */

.top-header {
    background: white;
    padding: 35px 0 20px 0;
    border-bottom: 3px solid rgba(0,0,0,0.05);
}
.head-right {
    position: absolute;
    right: 20px;
    top: 25px;
    
}
.head-left {
    text-align: center;
}

.brand-title {
    font-weight: 950;
    font-size: large;
    letter-spacing: 5px;
    margin: 0;
    font-size: 36px;
    display: inline-block;
    
}

.brand-tagline {
    font-size: 15px;
    color: #6b7280;
    margin-top: 4px;
}

/* ===== NAVIGATION ===== */

.top-nav {
    background: white;
    padding: 12px 10px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 10px;
    position: relative;
}


.top-nav .nav-left {
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
}




.top-nav a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
    padding: 5px 8px;
}

.top-nav a:hover {
    color: #0071e3;
}

.top-nav a.active {
    color: #0071e3;
    font-weight: 600;
}

/* ===== Logout button ===== */

.logout-btn button {
    border-radius: 10px;
    padding: 4px 12px;
}

/* ===== Main Content ===== */

.main {
    padding: 40px;
    
}

/* ===== Cards ===== */

.glass-card {
    background:white;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: transform 160ms ease, box-shadow 160ms ease;
}

.glass-card:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0px 20px 45px rgba(9, 9, 9, 0.876);
}

.stat-number {
    font-size: 28px;
    font-weight: 600;
}

/* Subscription / mobile card hover effect: defined globally so all cards behave similarly */
.subscription-card {
    transition: transform 160ms ease, box-shadow 160ms ease;
}

.subscription-card:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 18px 45px rgba(0,0,0,0.08);
}

/* ===== Buttons ===== */

.btn-modern {
    background: #0071e3;
    border: none;
    border-radius: 14px;
    padding: 6px 16px;
    color: white;
}

.btn-modern:hover {
    background: #005bb5;
}

/* ===== MOBILE ===== */

@media (max-width: 768px) {

    .brand-title {
        font-size: 25px;
        letter-spacing: 2px;
    }

    .brand-tagline {
        font-size: 12px;
    }
    .head-left{
        text-align: left;
        margin-left: 10px;
    }
     .head-right{
        position:absolute;
        right: 0px;
        top: 10px;
      
    }
    .main {
        padding: 20px 12px;
    }

    .stat-number {
        font-size: 22px;
    }

    .nav-left{
        display: flex;
        flex-wrap: wrap;
        flex-direction: row;
        align-items: stretch;
        gap: 6px;
        position: static;
    }

    .top-nav a {
        font-size: 14px;
    }

    .logout-btn {
        width: 60%;
        text-align: center;
    }

    .logout-btn button {
        width: 100%;
    }

    .nav-right {
        position: static;
        transform: none;
        justify-content: center;
        width: 100%;
    }
}
</style>

</head>

<!-- Service worker removed: this is a regular website now -->

<body>

<!-- HEADER -->
<div class="top-header">
    
    <div class="head-left">
       <h2 class="brand-title">GYM PILOT</h2>
       <div class="brand-tagline">Navigate » Manage » Grow.</div>
    </div>


    <div class="head-right mt-2">
        
          <!-- LOGOUT -->
          <form method="POST" action="{% url 'gym:owner_logout' %}" class="logout-btn m-0">
                {% csrf_token %}
                    
                <button type="submit" class="btn btn-outline-danger btn-sm" style="margin: 30px;">
                     Logout
                </button>
          </form>
     </div>
</div>


<!-- NAVBAR -->
<div class="top-nav">
     <div class="nav-left">
          <a href="{% url 'gym:dashboard' %}"
              class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>

          <a href="{% url 'gym:members' %}"
              class="{% if request.resolver_match.url_name == 'members' %}active{% endif %}">Members</a>

          <a href="{% url 'gym:plans' %}"
              class="{% if request.resolver_match.url_name == 'plans' %}active{% endif %}">Plans</a>

          <a href="{% url 'gym:subscriptions' %}"
              class="{% if request.resolver_match.url_name == 'subscriptions' %}active{% endif %}">Subscriptions</a>
     </div>
</div>

<!-- PAGE CONTENT -->
<div class="container main">
    {% block content %}{% endblock %}
</div>
  






</body>
</html>
