{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">

<title>GYM PILOT</title>

<link rel="stylesheet" href="{% static 'style.css' %}">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL THEME ================= */

:root{
--primary:#38ef7d;
--primary-soft:#2edc73;
--primary-glow:#3cff88;

--dark:#0b0b0b;
--card:#111;
--text:#ffffff;
--muted:#9ca3af;
}
body{
font-family:'Inter',sans-serif;
background:var(--dark);
color:var(--text);
overflow-x:hidden;
}


/* ================= HEADER ================= */

.top-header{
background:#000;
padding:22px 0;
border-bottom:1px solid #1a1a1a;
}

.head-right{
position:absolute;
right:20px;
top:22px;
}

.head-left{
text-align:center;
}

.logo-img{
height:85px;
object-fit:contain;
}


/* ================= NAVBAR ================= */
.top-nav{
background:#000;
padding:12px 10px;
border-bottom:1px solid #1a1a1a;

display:flex;
justify-content:center;
align-items:center;
gap:20px;

flex-wrap:nowrap;
overflow-x:auto;
}

.top-nav a{
text-decoration:none;
color:#9ca3af;
font-size :1.15rem;
font-weight:500;
padding:3px 4px;
transition:all .2s ease;
}

.top-nav a:hover{
color:var(--primary);
}

.top-nav a.active{
color:var(--primary);
text-shadow:0 0 8px rgba(56,239,125,0.5);
}

/* ================= MAIN CONTENT ================= */

.main{
padding:50px 30px;
max-width:1200px;
margin:auto;
}


/* ================= GLASS CARD ================= */
.glass-card{
background:#0f0f0f;
border-radius:20px;
min-width: 100px;
min-height: 135px;
padding:25px;
border:1px solid rgba(56,239,125,0.12);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
transition:all .25s ease;

overflow-x:auto;
}
.glass-card:hover{
transform:translateY(-4px);
border:1px solid rgba(56,239,125,0.25);
box-shadow:
0 20px 50px rgba(0,0,0,0.8),
0 0 15px rgba(56,239,125,0.25);
}
/* ================= DASHBOARD TEXT FIX ================= */

.glass-card small,
.glass-card span,
.glass-card p,
.glass-card h5,
.glass-card h6{
color:#ffffff !important;
font-size: 1.25rem;
}


/* ================= DASHBOARD NUMBERS ================= */

.stat-number{
font-size:34px;
font-weight:700;
color:var(--primary);
text-shadow:0 0 12px rgba(56,239,125,0.6);
}



/* ================= MOBILE SUBSCRIPTION CARD ================= */

/* ================= MOBILE SUBSCRIPTION CARD ================= */

.subscription-card{
background:#111;
padding:22px;
border-radius:18px;
margin-bottom:20px;
border:1px solid #1a1a1a;
transition:all .2s ease;
}

.subscription-card:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(0,0,0,0.6);
}

.subscription-card div{
font-size:15px;
color:#ddd;
}

.subscription-card strong{
color:#fff;
}


/* ================= BUTTON ================= */

.btn-modern{
background:var(--primary);
border:none;
border-radius:14px;
padding:7px 18px;
color:black;
font-weight:600;
box-shadow:0 0 12px rgba(56,239,125,0.4);
transition:all .2s ease;
}

.btn-modern:hover{
background:var(--primary-soft);
box-shadow:0 0 18px rgba(56,239,125,0.6);
}
/* ================= INPUT ================= */

input,select{
background:#111 !important;
border:1px solid #333 !important;
color:white !important;
}


/* ================= GLASS TABLE ================= */

.table{
width:100%;
margin:0;
background:transparent !important;
color:#ffffff;
border:none;
}

.table th,
.table td{
text-align:center;
}

.table thead{
background:transparent !important;
font-size: 1.25rem;
}

.table thead th{
color:var(--primary) ;
font-weight:600;
padding:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
font: size 1.25rem;;
}

.table td{
color:#ffffff !important;
padding:18px 20px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.table td div{
display:flex;
justify-content:center;
gap:6px;
flex-wrap:nowrap;
}

.table th:last-child,
.table td:last-child{
width:140px;
white-space:nowrap;
text-align:center;
}

.table tbody tr{
background:transparent !important;
}

.table tbody tr{
transition:all .15s ease;
}

.table tbody tr:hover{
background:rgba(56,239,125,0.06);
}

.table>:not(caption)>*>*{
background:transparent !important;
box-shadow:none !important;
}


/* ================= HEADINGS ================= */

h2{
font-weight:700;
margin-bottom:25px;
}


/* ================= MOBILE ================= */

@media (max-width:768px){

.top-nav a{
font-size:15.5px !important;
font-weight:600;
}

.logo-img{
height:60px;
}

.head-left{
text-align:left;
margin-left:10px;
}

.head-right{
position:absolute;
right:0;
top:10px;
}
th{
    font-size: 16px; 
}
td{
    font-size: 14px;
}
.main{
padding:15px 12px;
}

.stat-number{
font-size:18px;
}

.top-nav{
flex-wrap:wrap;
gap: 3px;
}

.top-nav a{
font-size: 0.875rem;
}
.glass-card h5,
.glass-card h6,
.glass-card p,
.glass-card small{
font-size:14px !important;
}

.stat-number{
font-size:22px !important;
}
/* ===== Expiry table mobile fix ===== */

/* ===== Expiry table mobile fix ===== */

.expire-table{
table-layout:fixed;
width:100%;
}

.expire-table th,
.expire-table td{
font-size:12px;
padding:6px 4px;
white-space:normal;
}

/* column sizing */

.expire-table th:nth-child(1),
.expire-table td:nth-child(1){
width:10%;
}

.expire-table th:nth-child(2),
.expire-table td:nth-child(2){
width:35%;
}

.expire-table th:nth-child(3),
.expire-table td:nth-child(3){
width:25%;
word-break:break-all;
}

.expire-table th:nth-child(4),
.expire-table td:nth-child(4){
width:15%;
}

.expire-table th:nth-child(5),
.expire-table td:nth-child(5){
width:15%;
}
}
.table tbody tr{
transition:all .15s ease;
}

.table tbody tr:hover{
background:rgba(56,239,125,0.06);
box-shadow:0 0 10px rgba(56,239,125,0.2);
}

.table tbody tr{
transition:all .15s ease;
}

.table tbody tr:hover{
background:rgba(56,239,125,0.06);
box-shadow:0 0 10px rgba(56,239,125,0.2);
}

.status-badge{
font-size:10px;
padding:3px 7px;
border-radius:999px;
font-weight:600;
}
</style>

</head>


<body>

<!-- ================= HEADER ================= -->

<div class="top-header">

<div class="head-left">
<img src="{% static 'images/logo.jpg' %}" 
     alt="Gym Pilot Logo"
     class="logo-img">
</div>

<div class="head-right">

<form method="POST" action="{% url 'gym:owner_logout' %}">
{% csrf_token %}
<button type="submit" class="btn btn-outline-danger btn-sm me-3 mt-4">
Logout
</button>
</form>

</div>

</div>


<!-- ================= NAVIGATION ================= -->

<div class="top-nav">

<a href="{% url 'gym:dashboard' %}"
class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
Dashboard
</a>

<a href="{% url 'gym:members' %}"
class="{% if request.resolver_match.url_name == 'members' %}active{% endif %}">
Members
</a>

<a href="{% url 'gym:plans' %}"
class="{% if request.resolver_match.url_name == 'plans' %}active{% endif %}">
Plans
</a>

<a href="{% url 'gym:subscriptions' %}"
class="{% if request.resolver_match.url_name == 'subscriptions' %}active{% endif %}">
Subscriptions
</a>

<li class="nav-item d-none d-md-block">
<a href="{% url 'gym:analytics' %}" class="nav-link">
Analytics
</a>
</li>
<a href="{% url 'gym:trainers' %}" class="d-none d-md-inline">
Trainer Management
</a>
</div>


<!-- ================= PAGE CONTENT ================= -->

<div class="container main">
{% block content %}
{% endblock %}
</div>

</body>
</html>
